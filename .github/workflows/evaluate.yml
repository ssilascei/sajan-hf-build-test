name: evaluate

on:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model for evaluation
        run: python scripts/train.py --config configs/train.yaml

      - name: Evaluate model
        run: python scripts/evaluate.py --config configs/train.yaml --model-dir artifacts/model --output artifacts/metrics/eval_metrics.json

      - name: Run quality gates
        run: python scripts/check_gates.py --metrics artifacts/metrics/eval_metrics.json --gates configs/quality_gates.yaml

      - name: Upload eval metrics
        uses: actions/upload-artifact@v4
        with:
          name: eval-metrics
          path: artifacts/metrics/eval_metrics.json
