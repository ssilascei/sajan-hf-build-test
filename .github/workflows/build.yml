name: build

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: "Model package prefix (for example: hf-ag-news-bert)"
        required: true
        type: string
      model_version:
        description: "Model version for release (example: v1.0.0 or 20260325.1). Leave empty to run train/evaluate only."
        required: false
        type: string

jobs:
  pipeline:
    uses: ./.github/workflows/hf-mlops-pipeline.yml
    with:
      model_name: ${{ github.event.inputs.model_name }}
      model_version: ${{ github.event.inputs.model_version }}
      skip_release: ${{ github.event.inputs.model_version == '' }}
      config_path: example/configs/train.yaml
      requirements_path: example/requirements.txt
      train_script_path: example/scripts/train.py
      evaluate_script_path: example/scripts/evaluate.py
      check_gates_script_path: example/scripts/check_gates.py
      package_script_path: example/scripts/package_model.py
      model_artifact_dir: example/artifacts/model
      train_metrics_path: example/artifacts/metrics/train_metrics.json
      eval_metrics_path: example/artifacts/metrics/eval_metrics.json
      eval_metrics_dir: example/artifacts/metrics
      package_output_dir: example/artifacts/package
      gates_config_path: example/configs/quality_gates.yaml
      schema_path: advanced/schemas/metrics_schema.json
      python_version: "3.11"
      runs_on: ubuntu-latest
    secrets:
      JFROG_URL: ${{ secrets.JFROG_URL }}
      JFROG_REPO: ${{ secrets.JFROG_REPO }}
      JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
