name: release

on:
  workflow_dispatch:
    inputs:
      model_version:
        description: "Model version (example: v1.0.0 or 20260323.1)"
        required: true
        type: string

jobs:
  quality_and_package:
    runs-on: ubuntu-latest
    outputs:
      package_name: ${{ steps.package_name.outputs.package_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python scripts/train.py --config configs/train.yaml

      - name: Evaluate model
        run: python scripts/evaluate.py --config configs/train.yaml --model-dir artifacts/model --output artifacts/metrics/eval_metrics.json

      - name: Enforce quality gates
        run: python scripts/check_gates.py --metrics artifacts/metrics/eval_metrics.json --gates configs/quality_gates.yaml

      - name: Package release artifact
        run: python scripts/package_model.py --version "${{ github.event.inputs.model_version }}"

      - name: Set package name output
        id: package_name
        run: echo "package_name=hf-bert-tiny-${{ github.event.inputs.model_version }}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: artifacts/package

  publish_to_artifactory:
    runs-on: ubuntu-latest
    needs: quality_and_package
    environment: production
    steps:
      - name: Download release package
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: artifacts/package

      - name: Publish to JFrog Artifactory
        env:
          JFROG_URL: ${{ secrets.JFROG_URL }}
          JFROG_REPO: ${{ secrets.JFROG_REPO }}
          JFROG_TOKEN: ${{ secrets.JFROG_TOKEN }}
          PACKAGE_NAME: ${{ needs.quality_and_package.outputs.package_name }}
        run: |
          if [ -z "$JFROG_URL" ] || [ -z "$JFROG_REPO" ] || [ -z "$JFROG_TOKEN" ]; then
            echo "Missing required JFrog secrets.";
            exit 1;
          fi
          PACKAGE_PATH="artifacts/package/$PACKAGE_NAME"
          CHECKSUM_PATH="${PACKAGE_PATH}.sha256"
          TARGET_BASE="$JFROG_URL/artifactory/$JFROG_REPO/huggingface-models/$PACKAGE_NAME"
          curl -f -H "Authorization: Bearer $JFROG_TOKEN" -T "$PACKAGE_PATH" "$TARGET_BASE"
          curl -f -H "Authorization: Bearer $JFROG_TOKEN" -T "$CHECKSUM_PATH" "${TARGET_BASE}.sha256"
